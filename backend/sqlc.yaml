version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/queries"
    schema: "internal/database/schema"
    gen:
      go:
        package: "database"
        out: "internal/database/generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_interface: true
        emit_exact_table_names: false
        emit_enum_valid_method: true
        emit_db_tags: true
        json_tags_case_style: "camel"
